<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/page/contact.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="main-header">
                <div class="sub-header">
                    <div class="logo"><a href="/Orchardly">
                            <img src="images/svg/logo-orchardly.svg" alt="logo">
                        </a></h1>
                    </div>
                    <nav class="nav">
                        <ul>
                            <li><a href="/Orchardly">Home</a></li>
                            <li><a href="/Orchardly/about.html">About</a></li>
                            <li><a href="/Orchardly/contact.html">Contact</a></li>
                            <li><a href="/Orchardly/shop.html" id="button" style="text-decoration: none;">Shop
                                    Now</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
    </header>

    <section class="hero">
        <div class="container">
            <div class="hero-wrapper">
                <div class="hero-section">
                    <div class="hero-title">
                        <h1>Contact us</h1>
                    </div>
                    <div class="hero-sub-heading">
                        <p>Have a question? We’re all ears.</p>
                    </div>

                    <form class="contact-form">

                        <div class="row">
                            <div class="input-group">
                                <label for="fname">First Name</label>
                                <input type="text" id="fname" name="firstname" placeholder="Jane">
                            </div>

                            <div class="input-group">
                                <label for="lname">Last Name</label>
                                <input type="text" id="lname" name="lastname" placeholder="Smitherton">
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="email">Email address</label>
                            <input type="text" id="email" name="email" placeholder="email@janesfakedomain.net">
                        </div>

                        <div class="input-group">
                            <label for="message">Your message</label>
                            <textarea id="message" name="message"
                                placeholder="Enter your question or message. Tell us how we can help! (Order issues, wholesale inquiries, or fruit requests)"></textarea>
                        </div>

                        <div class="main-button">
                            <button class="button">Submit</button>
                        </div>

                    </form>
                </div>


                <div class="hero-image">
                    <img src="images/png/box-contact.png" alt="image">
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-flex">

                <div class="footer-left">
                    <div class="logo"><a href="/Orchardly">
                            <img src="images/svg/logo-orchardly.svg" alt="logo"></a>
                    </div>

                    <div class="footer-img">
                        <ul>
                            <li><img src="images/svg/facebook.svg"></li>
                            <li><img src="images/svg/linkedin.svg"></li>
                            <li><img src="images/svg/yt.svg"></li>
                            <li><img src="images/svg/instagram.svg"></li>
                        </ul>
                    </div>
                </div>

                <div class="footer-right">
                    <div class="footer-col">

                        <h5>Company</h5>

                        <ul>
                            <li><a href="/Orchardly/index-2.html">Our Story</a></li>
                            <li><a href="/Orchardly/about.html">About</a></li>
                            <li><a href="/Orchardly/contact.html">Contact</a></li>
                        </ul>

                    </div>

                    <div class="footer-col">
                        <h5>Explore</h5>
                        <ul>
                            <li><a href="/Orchardly/product-detail.html">Products</a></li>
                            <li><a href="/Orchardly/article.html">Blog</a></li>

                        </ul>
                    </div>

                    <div class="footer-col">
                        <h5>More</h5>
                        <ul>
                            <li><a href="/Orchardly/waitlist.html">Waitlist</a></li>
                            <li><a href="/Orchardly/portfolio.html">Portfolio</a></li>
                            <li><a href="/Orchardly/pricing.html">Pricing</a></li>
                        </ul>
                    </div>

                </div>
            </div>

        </div>

        </div>
    </footer>
</body>

</html>
