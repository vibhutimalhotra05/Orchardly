<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waitlist</title>
    <link rel="stylesheet" href="css/page/waitlist.css">
    <link rel="stylesheet" href="css/common.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <nav class="nav">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/about.html">About</a></li>
                    <li><a href="/contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero-section">
        <div class="container">
            <div class="hero">
                <div class="hero-title">
                    <h1>Be the First to the Feast</h1>
                </div>
                <div class="hero-sub-heading">
                    <p>Sign up to get early access to our seasonal boxes and exclusive farm-to-table recipes.</p>
                </div>
                <form>
                    <label for="email"></label>
                    <input type="text" name="email" id="email" placeholder="Enter your email address">
                </form>
                <form>
                    <div class="main-button">
                        <button class="button">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-flex">


                <div class="footer-left">
                    <div class="logo"><a href="/">
                            <img src="images/svg/logo-orchardly.svg" alt="logo"></a>
                    </div>

                    <div class="footer-img">
                        <ul>
                            <li><img src="images/svg/facebook.svg"></li>
                            <li><img src="images/svg/linkedin.svg"></li>
                            <li><img src="images/svg/yt.svg"></li>
                            <li><img src="images/svg/instagram.svg"></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </footer>

</body>

</html>
